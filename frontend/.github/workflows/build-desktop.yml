name: Build Desktop App

"on":
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: 编译 Bun sidecar 可执行文件（多平台矩阵）
  # ─────────────────────────────────────────────────────────────────────────────
  build-sidecar:
    name: Build Sidecar (${{ matrix.artifact-name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            bun-target: bun-darwin-arm64
            artifact-name: sidecar-darwin-arm64
          - platform: macos-latest
            bun-target: bun-darwin-x64
            artifact-name: sidecar-darwin-x64
          - platform: ubuntu-22.04
            bun-target: bun-linux-x64
            artifact-name: sidecar-linux-x64
          - platform: windows-latest
            bun-target: bun-windows-x64
            artifact-name: sidecar-windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install claude-code dependencies
        working-directory: claude-code
        run: bun install

      - name: Build sidecar binary
        working-directory: claude-code
        run: bun run build:sidecar -- --target ${{ matrix.bun-target }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: frontend/src-tauri/binaries/claude-sidecar-*
          if-no-files-found: error
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: 构建 Tauri 桌面应用（依赖 Stage 1）
  # ─────────────────────────────────────────────────────────────────────────────
  build-tauri:
    name: Build Tauri (${{ matrix.sidecar-artifact }})
    needs: build-sidecar
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
            sidecar-artifact: sidecar-darwin-arm64
            artifact-suffix: macos-arm64
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
            sidecar-artifact: sidecar-darwin-x64
            artifact-suffix: macos-x64
          - platform: ubuntu-22.04
            args: ''
            rust-target: ''
            sidecar-artifact: sidecar-linux-x64
            artifact-suffix: linux-x64
          - platform: windows-latest
            args: ''
            rust-target: ''
            sidecar-artifact: sidecar-windows-x64
            artifact-suffix: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.sidecar-artifact }}
          path: frontend/src-tauri/binaries/

      - name: Make sidecar executable (Unix)
        if: matrix.platform != 'windows-latest'
        run: chmod +x frontend/src-tauri/binaries/claude-sidecar-*

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tauriScript: npx tauri
          args: ${{ matrix.args }}

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.artifact-suffix }}
          path: |
            frontend/src-tauri/target/*/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/*/release/bundle/deb/*.deb
            frontend/src-tauri/target/*/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/*/release/bundle/msi/*.msi
            frontend/src-tauri/target/*/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 7
