name: Build Desktop App

"on":
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            rust-target: aarch64-apple-darwin
            label: macos-arm64
            artifact-glob: 'frontend/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg'
          - os: macos-latest
            target: bun-darwin-x64
            rust-target: x86_64-apple-darwin
            label: macos-x64
            artifact-glob: 'frontend/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg'
          - os: windows-latest
            target: bun-windows-x64
            rust-target: x86_64-pc-windows-msvc
            label: windows-x64
            artifact-glob: 'frontend/src-tauri/target/release/bundle/nsis/*.exe'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.rust-target }}-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust-target }}-

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: Install claude-code dependencies
        working-directory: claude-code
        run: |
          # Initialize a temporary git repo for husky
          git init -q
          git config user.email "ci@example.com"
          git config user.name "CI"
          # Install dependencies with husky prepare script
          bun install
          # Clean up git repo
          rm -rf .git

      - name: Build sidecar
        working-directory: claude-code
        run: bun scripts/build-sidecar.ts --target ${{ matrix.target }}

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        working-directory: frontend
        run: pnpm tauri build --target ${{ matrix.rust-target }}

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        working-directory: frontend
        run: pnpm tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Code-Desktop-${{ matrix.label }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          generate_release_notes: true
